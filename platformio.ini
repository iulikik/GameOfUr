; PlatformIO Project Configuration File
; LilyGo T-Display-S3

[env:lilygo-t-display-s3]
platform  = espressif32
board     = lilygo-t-display-s3
framework = arduino

; ── Upload fix ────────────────────────────────────────────────────────────────
; The ESP32-S3 USB-CDC port re-enumerates after reset, so esptool needs a
; moment to find it again.  These two lines assert DTR/RTS to trigger the
; built-in bootloader automatically — no manual BOOT button needed.
upload_speed   = 921600
upload_flags   =
    --before=default_reset
    --after=hard_reset

; If the auto-reset still fails on your machine, uncomment the line below
; (replaces the USB-CDC port with the ROM bootloader's fixed VID:PID):
; upload_resetmethod = nodemcu

; ── Monitor ───────────────────────────────────────────────────────────────────
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder